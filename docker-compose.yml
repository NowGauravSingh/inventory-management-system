services:

  postgres:
    image: postgres:16-alpine

    container_name: inventory_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 789
      POSTGRES_DB: inventorydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: inventory_backend

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:789@postgres:5432/inventorydb

    depends_on:
      - postgres

  frontend:
    build: ./frontend

    container_name: inventory_frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: